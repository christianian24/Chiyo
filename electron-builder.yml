appId: com.chiyo.app
productName: Chiyo
directories:
  output: release/${version}
files:
  - dist
  - dist-electron
  - package.json
win:
  icon: build/icon.png
  target:
    - nsis
  artifactName: ${productName}.Setup.${version}.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  runAfterFinish: false
# Native dependencies like better-sqlite3 require this
asarUnpack:
  - "**/*.node"
